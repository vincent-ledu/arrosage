<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.2"
     width="49mm" height="51mm" viewBox="0 0 490 510">
  <desc>Custom PCB view for 2 Relay Module 5V (AZDelivery)</desc>

  <!-- Board outline -->
  <g id="board">
    <path d="M 20,5 H 470 A 15,15 0 0 1 485,20 V 490 A 15,15 0 0 1 470,505 H 20 A 15,15 0 0 1 5,490 V 20 A 15,15 0 0 1 20,5 z"
          fill="none" stroke="#000" stroke-width="1"/>
  </g>

  <!-- Silkscreen -->
  <g id="silkscreen">
    <path d="M 20,5 H 470 A 15,15 0 0 1 485,20 V 490 A 15,15 0 0 1 470,505 H 20 A 15,15 0 0 1 5,490 V 20 A 15,15 0 0 1 20,5 z"
          fill="none" stroke="white" stroke-width="2"/>
    <circle cx="30" cy="30" r="14" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="460" cy="30" r="14" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="30" cy="480" r="14" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="460" cy="480" r="14" fill="none" stroke="white" stroke-width="2"/>
    <text x="245" y="490" font-family="Arial" font-size="20" fill="white" text-anchor="middle">2 Relay Module</text>
  </g>

  <!-- Copper layers -->
  <g id="copper0">
    <g id="copper1">
      <!-- Right header pads, 2.54mm pitch approximated at 25 units -->
      <circle id="connector0pad" cx="432" cy="125" r="7" fill="none" stroke="#f7bd13" stroke-width="5"/>
      <circle id="connector1pad" cx="432" cy="155" r="7" fill="none" stroke="#f7bd13" stroke-width="5"/>
      <circle id="connector2pad" cx="432" cy="185" r="7" fill="none" stroke="#f7bd13" stroke-width="5"/>
      <circle id="connector3pad" cx="432" cy="215" r="7" fill="none" stroke="#f7bd13" stroke-width="5"/>

      <!-- Left screw terminal pads -->
      <circle id="connector4pad" cx="60" cy="100" r="11" fill="none" stroke="#f7bd13" stroke-width="6"/>
      <circle id="connector5pad" cx="60" cy="145" r="11" fill="none" stroke="#f7bd13" stroke-width="6"/>
      <circle id="connector6pad" cx="60" cy="190" r="11" fill="none" stroke="#f7bd13" stroke-width="6"/>
      <circle id="connector7pad" cx="60" cy="300" r="11" fill="none" stroke="#f7bd13" stroke-width="6"/>
      <circle id="connector8pad" cx="60" cy="345" r="11" fill="none" stroke="#f7bd13" stroke-width="6"/>
      <circle id="connector9pad" cx="60" cy="390" r="11" fill="none" stroke="#f7bd13" stroke-width="6"/>
    </g>
  </g>
</svg>
