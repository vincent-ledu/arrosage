<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.2"
     width="49mm" height="51mm" viewBox="0 0 490 510">
  <desc>Custom breadboard view for 2 Relay Module 5V (AZDelivery)</desc>

  <!-- Board -->
  <rect x="5" y="5" width="480" height="500" rx="18" ry="18" fill="#111111" stroke="#333333" stroke-width="2"/>

  <!-- Mounting holes -->
  <circle cx="30" cy="30" r="14" fill="white"/>
  <circle cx="460" cy="30" r="14" fill="white"/>
  <circle cx="30" cy="480" r="14" fill="white"/>
  <circle cx="460" cy="480" r="14" fill="white"/>

  <!-- Relays -->
  <rect x="120" y="70" width="180" height="150" rx="8" fill="#69b7ff" stroke="#3b6d96" stroke-width="2"/>
  <rect x="120" y="270" width="180" height="150" rx="8" fill="#69b7ff" stroke="#3b6d96" stroke-width="2"/>

  <!-- Screw terminal blocks -->
  <rect x="20" y="70" width="80" height="150" rx="4" fill="#2488c7" stroke="#1b5f8b" stroke-width="2"/>
  <rect x="20" y="270" width="80" height="150" rx="4" fill="#2488c7" stroke="#1b5f8b" stroke-width="2"/>

  <!-- Screw visuals -->
  <circle cx="60" cy="100" r="14" fill="#d9d9d9" stroke="#666" stroke-width="2"/>
  <circle cx="60" cy="145" r="14" fill="#d9d9d9" stroke="#666" stroke-width="2"/>
  <circle cx="60" cy="190" r="14" fill="#d9d9d9" stroke="#666" stroke-width="2"/>
  <circle cx="60" cy="300" r="14" fill="#d9d9d9" stroke="#666" stroke-width="2"/>
  <circle cx="60" cy="345" r="14" fill="#d9d9d9" stroke="#666" stroke-width="2"/>
  <circle cx="60" cy="390" r="14" fill="#d9d9d9" stroke="#666" stroke-width="2"/>

  <!-- Right header body -->
  <rect x="420" y="110" width="24" height="120" rx="3" fill="#222" stroke="#444" stroke-width="1"/>

  <!-- Title -->
  <text x="245" y="470" font-family="Arial" font-size="28" fill="white" text-anchor="middle">2 Relay Module</text>

  <!-- Labels left -->
  <text x="22" y="105" font-family="Arial" font-size="18" fill="white" transform="rotate(-90 22,105)">NO2</text>
  <text x="22" y="150" font-family="Arial" font-size="18" fill="white" transform="rotate(-90 22,150)">COM2</text>
  <text x="22" y="195" font-family="Arial" font-size="18" fill="white" transform="rotate(-90 22,195)">NC2</text>
  <text x="22" y="305" font-family="Arial" font-size="18" fill="white" transform="rotate(-90 22,305)">NO1</text>
  <text x="22" y="350" font-family="Arial" font-size="18" fill="white" transform="rotate(-90 22,350)">COM1</text>
  <text x="22" y="395" font-family="Arial" font-size="18" fill="white" transform="rotate(-90 22,395)">NC1</text>

  <!-- Labels right -->
  <text x="452" y="120" font-family="Arial" font-size="18" fill="white" transform="rotate(90 452,120)">GND</text>
  <text x="452" y="150" font-family="Arial" font-size="18" fill="white" transform="rotate(90 452,150)">IN1</text>
  <text x="452" y="180" font-family="Arial" font-size="18" fill="white" transform="rotate(90 452,180)">IN2</text>
  <text x="452" y="210" font-family="Arial" font-size="18" fill="white" transform="rotate(90 452,210)">VCC</text>

  <!-- Breadboard connectors (hidden copper/contact areas but clickable) -->
  <circle id="connector0pin" cx="432" cy="125" r="8" fill="#f7bd13"/>
  <circle id="connector1pin" cx="432" cy="155" r="8" fill="#f7bd13"/>
  <circle id="connector2pin" cx="432" cy="185" r="8" fill="#f7bd13"/>
  <circle id="connector3pin" cx="432" cy="215" r="8" fill="#f7bd13"/>

  <circle id="connector4pin" cx="60" cy="100" r="8" fill="#f7bd13" opacity="0.01"/>
  <circle id="connector5pin" cx="60" cy="145" r="8" fill="#f7bd13" opacity="0.01"/>
  <circle id="connector6pin" cx="60" cy="190" r="8" fill="#f7bd13" opacity="0.01"/>
  <circle id="connector7pin" cx="60" cy="300" r="8" fill="#f7bd13" opacity="0.01"/>
  <circle id="connector8pin" cx="60" cy="345" r="8" fill="#f7bd13" opacity="0.01"/>
  <circle id="connector9pin" cx="60" cy="390" r="8" fill="#f7bd13" opacity="0.01"/>
</svg>
